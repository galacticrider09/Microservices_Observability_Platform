name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: user-service
          - name: order-service
          - name: notification-service
          - name: sns-forwarder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service.name }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d user-service order-service notification-service

      - name: Wait for services
        run: sleep 15

      - name: Health check all services
        run: |
          curl --fail http://localhost:5001/health
          curl --fail http://localhost:5002/health
          curl --fail http://localhost:5003/health
          echo "✅ All health checks passed"

      - name: Teardown
        run: docker compose down